        "Nigdy nie śpiewałem piosenki z pełnym przekonaniem, totalnie myląc tekst.",
        "Nigdy nie zostałem brutalnie odrzucony przy próbie pocałunku.",
        "Nigdy nie napisałem do kogoś tradycyjnego, papierowego listu miłosnego.",
        "Nigdy nie skłamałem, że jestem w związku, tylko po to, żeby spławić natręta.",
        "Nigdy nie próbowałem odgadnąć hasła do telefonu mojego partnera.",
        "Nigdy nie rozmawiałem przez ponad godzinę z całkowicie przypadkowym nieznajomym.",
        "Nigdy nie skakałem ze spadochronem ani na bungee."
    ];

    // Aktywne kopie talii (do ubywania kart)
    let availOdwazni = [...tasksOdwazni];
    let availNigdy = [...tasksNigdy];

    // Ładowanie liczników na starcie
    const countOdwazni = document.getElementById('counter-odwazni');
    const countNigdy = document.getElementById('counter-nigdy');
    countOdwazni.innerText = `Pozostało kart: ${availOdwazni.length}`;
    countNigdy.innerText = `Pozostało haseł: ${availNigdy.length}`;

    // Funkcja losująca dla Odważni Nie Piją
    function drawOdwazni() {
        const taskEl = document.getElementById('task-odwazni');
        const btnEl = document.getElementById('drawBtn-odwazni');

        if (availOdwazni.length === 0) {
            taskEl.innerText = "To już wszystkie karty! Odśwież stronę, aby zagrać od nowa.";
            taskEl.classList.add('empty-state');
            btnEl.style.display = 'none';
            countOdwazni.innerText = "Koniec talii";
            return;
        }

        const idx = Math.floor(Math.random() * availOdwazni.length);
        taskEl.innerText = availOdwazni[idx];
        availOdwazni.splice(idx, 1);
        countOdwazni.innerText = `Pozostało kart: ${availOdwazni.length}`;
    }

    // Funkcja losująca dla Nigdy Nie
    function drawNigdy() {
        const taskEl = document.getElementById('task-nigdy');
        const btnEl = document.getElementById('drawBtn-nigdy');

        if (availNigdy.length === 0) {
            taskEl.innerText = "To już wszystkie hasła! Odśwież stronę, aby zagrać od nowa.";
            taskEl.classList.add('empty-state');
            btnEl.style.display = 'none';
            countNigdy.innerText = "Koniec talii";
            return;
        }

        const idx = Math.floor(Math.random() * availNigdy.length);
        taskEl.innerText = availNigdy[idx];
        availNigdy.splice(idx, 1);
        countNigdy.innerText = `Pozostało haseł: ${availNigdy.length}`;
    }

    // Płynne przełączanie widoków za pomocą JavaScript
    function switchView(viewName) {
        if (viewName === 'nigdy') {
            document.getElementById('view-odwazni').classList.remove('active');
            document.getElementById('view-nigdy').classList.add('active');
        } else {
            document.getElementById('view-nigdy').classList.remove('active');
            document.getElementById('view-odwazni').classList.add('active');
        }
    }
</script>
