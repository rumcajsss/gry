<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odważni Nie Piją</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; position: relative; }
        .card { width: 90%; max-width: 400px; min-height: 320px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; border: 4px solid #2ecc71; box-sizing: border-box; }
        h1 { color: #2ecc71; margin-bottom: 5px; font-size: 1.8rem; margin-top: 0; }
        #counter { font-size: 0.9rem; color: #888; margin-bottom: 25px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        #task { font-size: 1.3rem; font-weight: bold; margin-bottom: 30px; color: #333; min-height: 120px; display: flex; align-items: center; justify-content: center; line-height: 1.5; }
        button { padding: 15px 30px; font-size: 1rem; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 10px; transition: 0.3s; font-weight: bold; }
        button:hover { background: #27ae60; }
        .empty-state { color: #e74c3c !important; }
        
        /* Styl dla odnośnika na samym dole strony */
        .footer-link { position: absolute; bottom: 25px; color: #7f8c8d; text-decoration: none; font-size: 0.9rem; font-weight: bold; transition: 0.2s; padding: 10px 20px; background: rgba(255, 255, 255, 0.85); border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; }
        .footer-link:hover { color: #2ecc71; background: white; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.2); }
    </style>
</head>
<body>

<div class="card">
    <h1>Odważni Nie Piją</h1>
    <div id="counter">Wczytywanie talii...</div>
    <div id="task">Kliknij przycisk, aby odkryć pierwszą kartę!</div>
    <button id="drawBtn" onclick="drawTask()">Odkryj kartę</button>
</div>

<a href="nigdy-nie.html" class="footer-link">Przełącz na: „Nigdy nie...” &rarr;</a>

    ];

    let availableTasks = [...allTasks];

    const counterElement = document.getElementById('counter');
    counterElement.innerText = `Pozostało kart: ${availableTasks.length}`;

    function drawTask() {
        const taskElement = document.getElementById('task');
        const btnElement = document.getElementById('drawBtn');

        if (availableTasks.length === 0) {
            taskElement.innerText = "To już wszystkie karty! Odśwież stronę, aby zagrać od nowa.";
            taskElement.classList.add('empty-state');
            btnElement.style.display = 'none';
            counterElement.innerText = "Koniec talii";
            return;
        }

        const randomIndex = Math.floor(Math.random() * availableTasks.length);
        taskElement.innerText = availableTasks[randomIndex];
        availableTasks.splice(randomIndex, 1);

        counterElement.innerText = `Pozostało kart: ${availableTasks.length}`;
    }
</script>

</body>
</html>
